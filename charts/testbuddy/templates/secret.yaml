# ─────────────────────────────────────────────────────────────────────────────
# Secrets are stored as a K8s Secret and mounted as FILES — not env vars.
#
# Why files, not env vars?
#   - env vars are visible in: kubectl describe pod, /proc/1/environ,
#     crash dumps, log lines, child processes
#   - files mounted at /run/secrets/ are readable ONLY by the app process
#     and are never printed by kubectl or visible to other containers
#   - This follows CIS Kubernetes Benchmark + NIST SP 800-190 guidance
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.secrets.anthropicApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "testbuddy.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "testbuddy.labels" . | nindent 4 }}
  annotations:
    # Prevent helm diff from showing secret values
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Each key becomes a file at /run/secrets/<key>
  anthropic_api_key: {{ .Values.secrets.anthropicApiKey | quote }}

  {{- if .Values.secrets.grafanaToken }}
  grafana_token: {{ .Values.secrets.grafanaToken | quote }}
  {{- end }}

  {{- if .Values.secrets.grafanaUrl }}
  grafana_url: {{ .Values.secrets.grafanaUrl | quote }}
  {{- end }}

  {{- if .Values.secrets.openstackPassword }}
  openstack_password: {{ .Values.secrets.openstackPassword | quote }}
  openstack_auth_url: {{ .Values.secrets.openstackAuthUrl | quote }}
  openstack_username: {{ .Values.secrets.openstackUsername | quote }}
  openstack_project_id: {{ .Values.secrets.openstackProjectId | quote }}
  {{- end }}

  {{- if .Values.secrets.f5Password }}
  f5_password: {{ .Values.secrets.f5Password | quote }}
  f5_host: {{ .Values.secrets.f5Host | quote }}
  f5_username: {{ .Values.secrets.f5Username | quote }}
  {{- end }}

  # DB connection strings — one file per connection
  # File name: db_conn_<name>   Content: the DSN string
  {{- range $name, $dsn := .Values.secrets.dbConnections }}
  db_conn_{{ $name }}: {{ $dsn | quote }}
  {{- end }}
{{- end }}
